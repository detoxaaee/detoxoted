<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Network Pads</title>

<style>
html,body{
  margin:0;
  background:#000;
  overflow:hidden;
  touch-action:none;
}
.grid{
  width:100vw;
  height:100vh;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  grid-template-rows:repeat(4,1fr);
  gap:6px;
}
.pad{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#555;
}
.pad.active{
  background:#00ff88;
  color:#000;
}
</style>
</head>

<body>
<div class="grid" id="grid"></div>

<script>
// -------- SOCKET --------
const socket = new WebSocket(location.origin.replace("http","ws"))

// -------- AUDIO --------
let ctx
const buffers = []
const files = Array.from({length:20}, (_,i)=>`audios/audio${i+1}.mp3`)

async function loadBuffers(){
  for (let f of files){
    const res = await fetch(f)
    const arr = await res.arrayBuffer()
    buffers.push(await ctx.decodeAudioData(arr))
  }
}

// -------- SENSORES --------
let motion={x:0,y:0}
let rotation={gamma:0}

function smooth(a,b,f=0.2){return a+(b-a)*f}

function initSensors(){
  window.addEventListener("devicemotion", e=>{
    if(!e.accelerationIncludingGravity)return
    motion.x=smooth(motion.x,e.accelerationIncludingGravity.x)
    motion.y=smooth(motion.y,e.accelerationIncludingGravity.y)
  })
  window.addEventListener("deviceorientation", e=>{
    rotation.gamma=smooth(rotation.gamma,e.gamma||0)
  })
}

// -------- FLASH --------
let track
async function initFlash(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
    track=stream.getVideoTracks()[0]
  }catch(e){}
}
function flash(on){
  if(!track)return
  track.applyConstraints({advanced:[{torch:on}]})
}

// -------- PLAY --------
function trigger(i){
  const src=ctx.createBufferSource()
  src.buffer=buffers[i]

  const gain=ctx.createGain()

  // grupo 1
  if(i<5){
    const f=Math.abs(motion.x)+Math.abs(motion.y)
    gain.gain.value=Math.min(f/15,1)
  }else gain.gain.value=1

  // grupo 4
  if(i>=15){
    const speed=1+rotation.gamma/90
    src.playbackRate.value=Math.max(0.5,Math.min(speed,2))
  }

  src.connect(gain).connect(ctx.destination)
  src.start()

  // grupo 2 flash
  if(i>=5 && i<10){
    flash(true)
    setTimeout(()=>flash(false),120)
  }

  // grupo 3 vibración
  if(i>=10 && i<15){
    navigator.vibrate?.(80)
  }
}

// -------- UI --------
const grid=document.getElementById("grid")

for(let i=0;i<20;i++){
  const pad=document.createElement("div")
  pad.className="pad"
  pad.innerText=i+1

  pad.addEventListener("pointerdown", ()=>{
    trigger(i)
    socket.send(JSON.stringify({pad:i}))
  })

  grid.appendChild(pad)
}

// recibir eventos
socket.onmessage=(e)=>{
  const data=JSON.parse(e.data)
  trigger(data.pad)
}

// -------- INIT --------
document.body.addEventListener("pointerdown", async ()=>{
  ctx=new AudioContext()
  await loadBuffers()
  initSensors()
  initFlash()
}, {once:true})
</script>

</body>
</html>
